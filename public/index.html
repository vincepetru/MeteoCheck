<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Weather App</title>
    <link rel="stylesheet" href="../src/styles/main.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>My Weather App</h1>
      <form id="weather-form" class="weather-form">
        <label for="city-input">Città</label>
        <input id="city-input" name="city" type="text" placeholder="Es. Milano" required />
        <button type="submit">Cerca meteo</button>
      </form>
      <section id="weather-output" class="weather-output"></section>
    </main>

    <script type="module" src="../src/index.js"></script>
  </body>
</html>
